<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="排班 Agent 工作流">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12324a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 42px 'Microsoft YaHei',Arial,sans-serif;fill:#12324a}
      .label{font:600 24px 'Microsoft YaHei',Arial,sans-serif;fill:#24445e}
      .small{font:500 18px 'Microsoft YaHei',Arial,sans-serif;fill:#5f7488}
      .card{fill:#fff;stroke:#c8d7e6;stroke-width:2;rx:24;filter:url(#shadow)}
      .thin{stroke:#c8d7e6;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  
    <text x="90" y="115" class="title">排班 Agent 工作流</text>
    <text x="92" y="157" class="small">自然语言输入只生成辅助建议，最终由调度员确认。</text>
    <g transform="translate(120,360)">
      <rect class="card" width="185" height="136"/>
      <circle cx="34" cy="38" r="18" fill="#2bc8f0"/>
      <text x="28" y="45" font-size="20" font-weight="700" fill="#fff">1</text>
      <text x="24" y="92" class="label">调度员输入问题</text>
    </g><path d="M310 428 H326" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round"/><path d="M312 414 L332 428 L312 442" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(340,360)">
      <rect class="card" width="185" height="136"/>
      <circle cx="34" cy="38" r="18" fill="#2bc8f0"/>
      <text x="28" y="45" font-size="20" font-weight="700" fill="#fff">2</text>
      <text x="24" y="92" class="label">Agent识别异常</text>
    </g><path d="M530 428 H546" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round"/><path d="M532 414 L552 428 L532 442" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(560,360)">
      <rect class="card" width="185" height="136"/>
      <circle cx="34" cy="38" r="18" fill="#2bc8f0"/>
      <text x="28" y="45" font-size="20" font-weight="700" fill="#fff">3</text>
      <text x="24" y="92" class="label">查询规则</text>
    </g><path d="M750 428 H766" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round"/><path d="M752 414 L772 428 L752 442" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(780,360)">
      <rect class="card" width="185" height="136"/>
      <circle cx="34" cy="38" r="18" fill="#2bc8f0"/>
      <text x="28" y="45" font-size="20" font-weight="700" fill="#fff">4</text>
      <text x="24" y="92" class="label">生成建议</text>
    </g><path d="M970 428 H986" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round"/><path d="M972 414 L992 428 L972 442" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(1000,360)">
      <rect class="card" width="185" height="136"/>
      <circle cx="34" cy="38" r="18" fill="#2eb67d"/>
      <text x="28" y="45" font-size="20" font-weight="700" fill="#fff">5</text>
      <text x="24" y="92" class="label">调度员确认</text>
    </g>
    <rect x="92" y="642" width="1416" height="98" rx="24" fill="#fff" stroke="#c8d7e6" stroke-width="2"/>
    <text x="126" y="704" class="label">适用页面：时刻表管理、排班工作流、Agent助手、路演模式</text>
</svg>