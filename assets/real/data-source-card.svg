<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" fill="none">
  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>
  <rect width="440" height="240" fill="#ffffff"/>
  <rect x="1" y="1" width="438" height="238" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="1" y="1" width="438" height="34" rx="8" fill="#1565c0"/>
  <rect x="1" y="20" width="438" height="15" fill="#1565c0"/>
  <text x="220" y="23" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">数据与素材来源</text>

  <circle cx="34" cy="62" r="5" fill="#16a34a"/>
  <text x="48" y="66" font-size="11" fill="#1e293b">公开资料：北京地铁10号线站点、运营时间</text>

  <circle cx="34" cy="88" r="5" fill="#16a34a"/>
  <text x="48" y="92" font-size="11" fill="#1e293b">站名转换表：基于公开站点信息整理</text>

  <circle cx="34" cy="114" r="5" fill="#1565c0"/>
  <text x="48" y="118" font-size="11" fill="#1e293b">演示数据：模拟时刻表、乘务员、片段</text>

  <circle cx="34" cy="140" r="5" fill="#1565c0"/>
  <text x="48" y="144" font-size="11" fill="#1e293b">项目规则引擎：片段划分与规则校验</text>

  <circle cx="34" cy="166" r="5" fill="#d97706"/>
  <text x="48" y="170" font-size="11" fill="#1e293b">AI辅助建议：仅供调度员复核参考</text>

  <line x1="20" y1="186" x2="420" y2="186" stroke="#e2e8f0" stroke-width="1"/>
  <text x="20" y="204" font-size="10" fill="#64748b">引用：Wikipedia 北京地铁10号线 · bjsubway.com · jtw.beijing.gov.cn</text>
  <text x="20" y="220" font-size="10" fill="#94a3b8">路演演示用 · 不连接真实运营系统 · 正式商用需替换授权素材</text>
