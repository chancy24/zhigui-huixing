<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="排班规则引擎示意">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12324a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 42px 'Microsoft YaHei',Arial,sans-serif;fill:#12324a}
      .label{font:600 24px 'Microsoft YaHei',Arial,sans-serif;fill:#24445e}
      .small{font:500 18px 'Microsoft YaHei',Arial,sans-serif;fill:#5f7488}
      .card{fill:#fff;stroke:#c8d7e6;stroke-width:2;rx:24;filter:url(#shadow)}
      .thin{stroke:#c8d7e6;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  
    <text x="90" y="105" class="title">排班规则引擎示意</text>
    <text x="92" y="147" class="small">输入运营数据与规则，输出可解释的辅助方案。</text>
    <rect class="card" x="120" y="210" width="260" height="92"/><text x="154" y="268" class="label">时刻表数据</text><path d="M385 256 H650" stroke="#2f80ed" stroke-width="5" stroke-linecap="round"/><rect class="card" x="120" y="360" width="260" height="92"/><text x="154" y="418" class="label">乘务员数据</text><path d="M385 406 H650" stroke="#2f80ed" stroke-width="5" stroke-linecap="round"/><rect class="card" x="120" y="510" width="260" height="92"/><text x="154" y="568" class="label">规则库</text><path d="M385 556 H650" stroke="#2f80ed" stroke-width="5" stroke-linecap="round"/><rect class="card" x="120" y="660" width="260" height="92"/><text x="154" y="718" class="label">异常事件</text><path d="M385 706 H650" stroke="#2f80ed" stroke-width="5" stroke-linecap="round"/>
    <rect x="650" y="285" width="300" height="330" rx="36" fill="#fff" stroke="#2f80ed" stroke-width="5" filter="url(#shadow)"/>
    <text x="720" y="430" class="title" font-size="36">规则引擎</text>
    <text x="704" y="482" class="small">工时 / 间休 / 地点 / 用餐 / 里程</text>
    <path d="M950 450 H1163 V316 H1179" fill="none" stroke="#2eb67d" stroke-width="5" stroke-linecap="round"/><rect class="card" x="1185" y="270" width="280" height="96"/><text x="1219" y="331" class="label">合规方案</text><path d="M950 450 H1163 V476 H1179" fill="none" stroke="#2eb67d" stroke-width="5" stroke-linecap="round"/><rect class="card" x="1185" y="430" width="280" height="96"/><text x="1219" y="491" class="label">风险提示</text><path d="M950 450 H1163 V636 H1179" fill="none" stroke="#2eb67d" stroke-width="5" stroke-linecap="round"/><rect class="card" x="1185" y="590" width="280" height="96"/><text x="1219" y="651" class="label">人工复核项</text>
</svg>