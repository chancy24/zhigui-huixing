<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" fill="none">
  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>
  <rect width="900" height="700" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a3a6b">北京地铁线网抽象示意图</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#6b7a90">Beijing Subway Network — 路演演示用 · 非官方线网图</text>

  <!-- Line 1 (red) horizontal -->
  <line x1="40" y1="300" x2="860" y2="300" stroke="#c41e3a" stroke-width="4" opacity="0.6"/>
  <text x="65" y="290" font-size="10" fill="#c41e3a" font-weight="bold">1号线</text>

  <!-- Line 10 (blue) ring -->
  <ellipse cx="450" cy="380" rx="340" ry="180" stroke="#1565c0" stroke-width="5" fill="none" opacity="0.7"/>
  <text x="790" y="420" font-size="11" fill="#1565c0" font-weight="bold">10号线</text>

  <!-- Line 4 (teal) N-S -->
  <line x1="300" y1="80" x2="300" y2="620" stroke="#00a19b" stroke-width="3" opacity="0.5"/>
  <text x="265" y="100" font-size="10" fill="#00a19b" font-weight="bold">4号线</text>

  <!-- Line 5 (purple) N-S -->
  <line x1="550" y1="100" x2="550" y2="600" stroke="#8e44ad" stroke-width="3" opacity="0.5"/>
  <text x="558" y="120" font-size="10" fill="#8e44ad" font-weight="bold">5号线</text>

  <!-- Line 2 (dark blue) inner ring -->
  <ellipse cx="450" cy="360" rx="200" ry="100" stroke="#004d99" stroke-width="3" fill="none" opacity="0.4"/>
  <text x="655" y="380" font-size="10" fill="#004d99" font-weight="bold">2号线</text>

  <!-- Line 13 (yellow) top arc -->
  <path d="M 200 180 Q 450 60 700 180" stroke="#f4c430" stroke-width="3" fill="none" opacity="0.5"/>
  <text x="430" y="85" font-size="10" fill="#f4c430" font-weight="bold">13号线</text>

  <!-- Center -->
  <circle cx="450" cy="380" r="20" fill="#1565c0" opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <rect x="410" y="365" width="80" height="30" rx="5" fill="#1565c0"/>
  <text x="450" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">10号线环线</text>

  <!-- Labels -->
  <text x="450" y="400" text-anchor="middle" font-size="9" fill="#64748b">路演演示场景：乘务轮乘图编制</text>

  <!-- Legend -->
  <rect x="30" y="640" width="840" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="658" font-size="9" fill="#94a3b8">本图为路演演示抽象示意图。彩色线条仅为线网拓扑示意，非实际地理走向。</text>
  <text x="50" y="675" font-size="9" fill="#94a3b8">数据来源：北京地铁公开信息。仅用于乘务排班系统演示场景。AI建议需由调度员复核确认。</text>
</svg>
