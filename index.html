<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智轨慧行 - 北京地铁10号线乘务排班与调度管理系统</title>
    <script type="module" crossorigin src="./assets/index-v2-no-login.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-v2-style.css">
  </head>
  <body>
        <script>
      // GitHub Pages SPA redirect receiver
      (function(l) {
        if (l.search[0] === '?') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          var newPath = l.pathname.replace(/\/$/, '') + decoded + l.hash;
          window.history.replaceState(null, null, newPath);
        }
      }(window.location))
    </script>
    <div id="app"></div>
  </body>
</html>
