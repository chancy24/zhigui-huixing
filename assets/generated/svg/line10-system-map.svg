      <text x="292" y="198" class="small">出退勤</text>
    </g>
    <g transform="translate(1140 92)">
      <rect class="card" width="330" height="168"/>
      <circle cx="38" cy="45" r="12" fill="#fff" stroke="#2bc8f0" stroke-width="6"/><text x="62" y="53" class="small">普通站</text>
      <circle cx="38" cy="88" r="12" fill="#fff" stroke="#2f80ed" stroke-width="6"/><text x="62" y="96" class="small">换乘站</text>
      <circle cx="38" cy="131" r="12" fill="#fff" stroke="#2eb67d" stroke-width="6"/><text x="62" y="139" class="small">出退勤点</text>
    </g>
</svg>