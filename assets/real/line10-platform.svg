<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3f2fd"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- 天花板/管线 -->
  <rect x="0" y="0" width="640" height="40" fill="#cbd5e1"/>
  <rect x="40" y="18" width="60" height="8" rx="2" fill="#94a3b8"/>
  <rect x="540" y="18" width="60" height="8" rx="2" fill="#94a3b8"/>
  <!-- 照明灯 -->
  <rect x="280" y="14" width="80" height="10" rx="3" fill="#fffbe6" stroke="#fde68a" stroke-width="1"/>

  <!-- 站台 -->
  <rect x="0" y="250" width="640" height="110" fill="#e2e8f0"/>
  <rect x="0" y="250" width="640" height="6" fill="#1565c0"/>
  <!-- 站台安全门 -->
  <g fill="#dbeafe" stroke="#90caf9" stroke-width="1">
    <rect x="40" y="180" width="70" height="70"/>
    <rect x="120" y="180" width="70" height="70"/>
    <rect x="200" y="180" width="70" height="70"/>
    <rect x="370" y="180" width="70" height="70"/>
    <rect x="450" y="180" width="70" height="70"/>
    <rect x="530" y="180" width="70" height="70"/>
  </g>
  <g stroke="#1565c0" stroke-width="2">
    <line x1="75" y1="180" x2="75" y2="250"/>
    <line x1="155" y1="180" x2="155" y2="250"/>
    <line x1="235" y1="180" x2="235" y2="250"/>
    <line x1="405" y1="180" x2="405" y2="250"/>
    <line x1="485" y1="180" x2="485" y2="250"/>
    <line x1="565" y1="180" x2="565" y2="250"/>
  </g>

  <!-- 站台立柱 -->
  <rect x="310" y="40" width="20" height="210" fill="#cbd5e1"/>
  <rect x="305" y="36" width="30" height="8" fill="#94a3b8"/>

  <!-- 站名牌 -->
  <rect x="220" y="60" width="200" height="44" rx="6" fill="#1565c0"/>
  <text x="320" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">10号线</text>
  <text x="320" y="98" text-anchor="middle" font-size="11" fill="#e3f2fd">Beijing Subway Line 10</text>

  <!-- 轨道 -->
  <rect x="0" y="160" width="640" height="20" fill="#475569"/>
  <line x1="0" y1="166" x2="640" y2="166" stroke="#94a3b8" stroke-width="2" stroke-dasharray="14 10"/>
  <line x1="0" y1="176" x2="640" y2="176" stroke="#94a3b8" stroke-width="2" stroke-dasharray="14 10"/>

  <!-- 导向标识 -->
  <rect x="40" y="120" width="120" height="28" rx="4" fill="#fff" stroke="#e2e8f0"/>
  <text x="100" y="138" text-anchor="middle" font-size="12" fill="#1565c0">→ 内环方向</text>
  <rect x="480" y="120" width="120" height="28" rx="4" fill="#fff" stroke="#e2e8f0"/>
  <text x="540" y="138" text-anchor="middle" font-size="12" fill="#1565c0">外环方向 ←</text>

  <!-- 底部说明 -->
  <rect x="0" y="335" width="640" height="25" fill="#1e293b" opacity="0.75"/>
  <text x="320" y="352" text-anchor="middle" font-size="10" fill="#cbd5e1">站台示意图 · 演示占位图 · 替换为真实调研照片请放入 public/assets/real/line10-platform.jpg</text>
</svg>
