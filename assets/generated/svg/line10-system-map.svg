<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="北京地铁10号线简化环线图">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12324a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 42px 'Microsoft YaHei',Arial,sans-serif;fill:#12324a}
      .label{font:600 24px 'Microsoft YaHei',Arial,sans-serif;fill:#24445e}
      .small{font:500 18px 'Microsoft YaHei',Arial,sans-serif;fill:#5f7488}
      .card{fill:#fff;stroke:#c8d7e6;stroke-width:2;rx:24;filter:url(#shadow)}
      .thin{stroke:#c8d7e6;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  
    <text x="90" y="95" class="title">北京地铁10号线简化环线图</text>
    <text x="92" y="136" class="small">蓝白风格示意图，不含真实机构 Logo，可用于系统页面高亮站点和区间。</text>
    <path d="M270 175 C440 95 875 105 1055 205 C1290 335 1285 560 1040 705 C850 820 520 775 355 585 C210 420 205 250 270 175Z" fill="none" stroke="#2f80ed" stroke-width="22" stroke-linecap="round"/>
    <path d="M270 175 C440 95 875 105 1055 205 C1290 335 1285 560 1040 705 C850 820 520 775 355 585 C210 420 205 250 270 175Z" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity=".86"/>
    <g>
      <circle cx="420" cy="160" r="16" fill="#fff" stroke="#2eb67d" stroke-width="7"/>
      <text x="442" y="156" class="label">巴沟</text>
      <text x="442" y="183" class="small">出退勤</text>
    </g><g>
      <circle cx="660" cy="145" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="682" y="141" class="label">知春路</text>
      <text x="682" y="168" class="small">换乘</text>
    </g><g>
      <circle cx="1030" cy="190" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="1052" y="186" class="label">三元桥</text>
      <text x="1052" y="213" class="small">换乘</text>
    </g><g>
      <circle cx="1210" cy="405" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="1232" y="401" class="label">国贸</text>
      <text x="1232" y="428" class="small">换乘</text>
    </g><g>
      <circle cx="1010" cy="700" r="16" fill="#fff" stroke="#2eb67d" stroke-width="7"/>
      <text x="1032" y="696" class="label">宋家庄</text>
      <text x="1032" y="723" class="small">出退勤</text>
    </g><g>
      <circle cx="750" cy="730" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="772" y="726" class="label">角门西</text>
      <text x="772" y="753" class="small">换乘</text>
    </g><g>
      <circle cx="500" cy="680" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="522" y="676" class="label">首经贸</text>
      <text x="522" y="703" class="small">换乘</text>
    </g><g>
      <circle cx="335" cy="520" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="357" y="516" class="label">六里桥</text>
      <text x="357" y="543" class="small">换乘</text>
    </g><g>
      <circle cx="310" cy="330" r="16" fill="#fff" stroke="#2f80ed" stroke-width="7"/>
      <text x="332" y="326" class="label">公主坟</text>
      <text x="332" y="353" class="small">换乘</text>
    </g><g>
      <circle cx="360" cy="230" r="16" fill="#fff" stroke="#2bc8f0" stroke-width="7"/>
      <text x="382" y="226" class="label">车道沟</text>
      <text x="382" y="253" class="small">普通</text>
    </g><g>
      <circle cx="270" cy="175" r="16" fill="#fff" stroke="#2eb67d" stroke-width="7"/>
