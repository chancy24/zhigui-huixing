<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="项目基础证据墙">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12324a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 42px 'Microsoft YaHei',Arial,sans-serif;fill:#12324a}
      .label{font:600 24px 'Microsoft YaHei',Arial,sans-serif;fill:#24445e}
      .small{font:500 18px 'Microsoft YaHei',Arial,sans-serif;fill:#5f7488}
      .card{fill:#fff;stroke:#c8d7e6;stroke-width:2;rx:24;filter:url(#shadow)}
      .thin{stroke:#c8d7e6;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  
    <text x="90" y="105" class="title">项目基础证据墙</text>
    <text x="92" y="147" class="small">把调研、源码、PPT、业务流程和公开资料组织成可说明的证据素材。</text>
    <g transform="translate(130,265)">
      <rect class="card" width="340" height="150"/>
      <rect x="28" y="28" width="86" height="86" rx="16" fill="#edfdf6" stroke="#2eb67d" stroke-width="3"/>
      <path d="M48 82 H94 M48 58 H96 M48 106 H78" stroke="#2eb67d" stroke-width="7" stroke-linecap="round"/>
      <text x="140" y="82" class="label">项目调研</text>
      <text x="140" y="118" class="small">可追溯素材</text>
    </g><g transform="translate(560,265)">
      <rect class="card" width="340" height="150"/>
      <rect x="28" y="28" width="86" height="86" rx="16" fill="#eaf7ff" stroke="#2bc8f0" stroke-width="3"/>
      <path d="M48 82 H94 M48 58 H96 M48 106 H78" stroke="#2bc8f0" stroke-width="7" stroke-linecap="round"/>
      <text x="140" y="82" class="label">源代码</text>
      <text x="140" y="118" class="small">可追溯素材</text>
    </g><g transform="translate(990,265)">
      <rect class="card" width="340" height="150"/>
      <rect x="28" y="28" width="86" height="86" rx="16" fill="#edfdf6" stroke="#2eb67d" stroke-width="3"/>
      <path d="M48 82 H94 M48 58 H96 M48 106 H78" stroke="#2eb67d" stroke-width="7" stroke-linecap="round"/>
      <text x="140" y="82" class="label">PPT材料</text>
      <text x="140" y="118" class="small">可追溯素材</text>
    </g><g transform="translate(130,475)">
      <rect class="card" width="340" height="150"/>
      <rect x="28" y="28" width="86" height="86" rx="16" fill="#eaf7ff" stroke="#2bc8f0" stroke-width="3"/>
      <path d="M48 82 H94 M48 58 H96 M48 106 H78" stroke="#2bc8f0" stroke-width="7" stroke-linecap="round"/>
      <text x="140" y="82" class="label">业务流程</text>
      <text x="140" y="118" class="small">可追溯素材</text>
    </g><g transform="translate(560,475)">
      <rect class="card" width="340" height="150"/>
      <rect x="28" y="28" width="86" height="86" rx="16" fill="#edfdf6" stroke="#2eb67d" stroke-width="3"/>
      <path d="M48 82 H94 M48 58 H96 M48 106 H78" stroke="#2eb67d" stroke-width="7" stroke-linecap="round"/>
      <text x="140" y="82" class="label">公开资料</text>
      <text x="140" y="118" class="small">可追溯素材</text>
    </g>
</svg>