<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" fill="none">
  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>
  <rect width="640" height="280" fill="#ffffff"/>
  <!-- 轨道 -->
  <rect x="0" y="200" width="640" height="16" fill="#475569"/>
  <line x1="0" y1="206" x2="640" y2="206" stroke="#94a3b8" stroke-width="2" stroke-dasharray="12 8"/>
  <line x1="0" y1="214" x2="640" y2="214" stroke="#94a3b8" stroke-width="2" stroke-dasharray="12 8"/>

  <!-- 列车车身 -->
  <rect x="60" y="100" width="520" height="100" rx="14" fill="#1e88e5"/>
  <rect x="60" y="100" width="520" height="100" rx="14" fill="none" stroke="#0d47a1" stroke-width="2"/>
  <!-- 车头 -->
  <path d="M580,100 L612,140 L612,200 L580,200 Z" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <!-- 前窗 -->
  <path d="M586,120 L606,145 L606,170 L586,170 Z" fill="#bbdefb" opacity="0.85"/>
  <!-- 车厢分隔 -->
  <line x1="195" y1="100" x2="195" y2="200" stroke="#0d47a1" stroke-width="2"/>
  <line x1="325" y1="100" x2="325" y2="200" stroke="#0d47a1" stroke-width="2"/>
  <line x1="455" y1="100" x2="455" y2="200" stroke="#0d47a1" stroke-width="2"/>
  <!-- 车窗 -->
  <g fill="#bbdefb" stroke="#0d47a1" stroke-width="1">
    <rect x="78" y="120" width="100" height="34" rx="4"/>
    <rect x="210" y="120" width="100" height="34" rx="4"/>
    <rect x="340" y="120" width="100" height="34" rx="4"/>
    <rect x="470" y="120" width="100" height="34" rx="4"/>
  </g>
  <!-- 车门 -->
  <g fill="#e3f2fd" stroke="#0d47a1" stroke-width="1">
    <rect x="88" y="160" width="22" height="34" rx="2"/>
    <rect x="146" y="160" width="22" height="34" rx="2"/>
    <rect x="220" y="160" width="22" height="34" rx="2"/>
    <rect x="278" y="160" width="22" height="34" rx="2"/>
    <rect x="350" y="160" width="22" height="34" rx="2"/>
    <rect x="408" y="160" width="22" height="34" rx="2"/>
    <rect x="480" y="160" width="22" height="34" rx="2"/>
    <rect x="538" y="160" width="22" height="34" rx="2"/>
  </g>
  <!-- 车轮 -->
  <g fill="#334155">
    <circle cx="110" cy="216" r="14"/>
    <circle cx="250" cy="216" r="14"/>
    <circle cx="390" cy="216" r="14"/>
    <circle cx="530" cy="216" r="14"/>
  </g>
  <g fill="#64748b">
    <circle cx="110" cy="216" r="5"/>
    <circle cx="250" cy="216" r="5"/>
    <circle cx="390" cy="216" r="5"/>
    <circle cx="530" cy="216" r="5"/>
  </g>

  <!-- 线路标识 -->
  <circle cx="100" cy="80" r="18" fill="#1565c0" stroke="#fff" stroke-width="3"/>
  <text x="100" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">10</text>
  <text x="320" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a6b">北京地铁10号线列车示意</text>
  <text x="320" y="78" text-anchor="middle" font-size="11" fill="#64748b">Beijing Subway Line 10 · 6-car EMU</text>

  <!-- 受电弓 -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="180" y1="100" x2="180" y2="84"/>
    <line x1="170" y1="84" x2="190" y2="84"/>
    <line x1="440" y1="100" x2="440" y2="84"/>
    <line x1="430" y1="84" x2="450" y2="84"/>
  </g>

  <!-- 底部说明 -->
  <text x="320" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">列车示意图 · 演示占位图 · 替换为真实照片请放入 public/assets/real/line10-train.jpg</text>
</svg>
